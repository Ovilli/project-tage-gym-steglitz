<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Student Project Showcase</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body { background: linear-gradient(180deg, #f8f6f1 0%, #eef2f6 100%); }
    .hero-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); }
    .project-cover { height: 170px; display: flex; align-items: end; justify-content: space-between; padding: 1rem; color: #fff; }
    .project-letter { font-size: 4rem; line-height: 1; font-weight: 800; opacity: 0.9; }
    .project-tag { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.35rem 0.55rem; border: 1px solid rgba(255, 255, 255, 0.25); background: rgba(0, 0, 0, 0.18); border-radius: 999px; }
    .card { overflow: hidden; box-shadow: 0 0.75rem 2rem rgba(15, 23, 42, 0.08); }
    #qrContainer canvas, #qrContainer img { max-width: 100%; height: auto; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top">
    <div class="container py-2">
      <span class="navbar-brand fw-bold mb-0" id="brandTitle">Tage Gym Steglitz</span>
      <div class="d-flex align-items-center gap-2">
        <span class="badge text-bg-secondary" id="countBadge">0 projects</span>
        <a class="btn btn-primary" href="admin.html">Admin</a>
      </div>
    </div>
  </nav>

  <header class="container py-5">
    <div class="row align-items-end g-4">
      <div class="col-lg-8">
        <p class="text-uppercase text-primary fw-semibold small mb-2">Student project showcase</p>
        <h1 class="display-4 fw-bold mb-3" id="showcaseTitle">Student Projects</h1>
        <p class="lead text-secondary mb-0" id="showcaseSubtitle">Web Development - Spring 2025</p>
      </div>
      <div class="col-lg-4 text-lg-end">
        <div class="p-4 rounded-4 hero-panel border">
          <div class="display-5 fw-bold" id="projectCount">0</div>
          <div class="text-uppercase small text-secondary">Projects</div>
        </div>
      </div>
    </div>
  </header>

  <main class="container pb-5">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end gap-3 mb-4">
      <div>
        <h2 class="h4 mb-1">Projects</h2>
        <p class="text-secondary mb-0">Open a preview or generate a QR code. Admin controls live on a separate page.</p>
      </div>
      <div class="col-12 col-md-5 col-lg-4">
        <input type="search" class="form-control" id="searchInput" placeholder="Search students or code">
      </div>
    </div>

    <div class="alert alert-light border" id="emptyState">No projects yet. Use the admin page to add one.</div>
    <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4" id="projectGrid"></div>
  </main>

  <div class="modal fade" id="qrModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="qrTitle">QR code</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body text-center">
          <div class="mb-3 text-secondary small" id="qrHint"></div>
          <div class="d-flex justify-content-center mb-3">
            <div id="qrContainer" class="p-3 bg-white border rounded-3"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
          <button type="button" class="btn btn-primary" id="downloadQrBtn">Download PNG</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="viewerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="viewerTitle">Project viewer</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-0">
          <iframe id="viewerFrame" title="Project preview" style="width:100%;height:min(80vh,900px);border:0;background:#fff;"></iframe>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const STORAGE_KEYS = { students: 'showcase_students', settings: 'showcase_settings' };
    const DEFAULT_SETTINGS = { title: 'Student Projects', subtitle: 'Web Development - Spring 2025' };
    const COLORS = ['#1f3a5f', '#0f766e', '#7c3aed', '#b45309', '#155e75', '#14532d', '#7c2d12', '#3730a3'];

    let students = [];
    let settings = { ...DEFAULT_SETTINGS };
    let qrIndex = null;

    const projectGrid = document.getElementById('projectGrid');
    const emptyState = document.getElementById('emptyState');
    const searchInput = document.getElementById('searchInput');
    const qrModal = new bootstrap.Modal(document.getElementById('qrModal'));
    const viewerModal = new bootstrap.Modal(document.getElementById('viewerModal'));

    function loadData() {
      try {
        const storedStudents = localStorage.getItem(STORAGE_KEYS.students);
        const storedSettings = localStorage.getItem(STORAGE_KEYS.settings);
        if (storedStudents) students = JSON.parse(storedStudents) || [];
        if (storedSettings) settings = { ...settings, ...JSON.parse(storedSettings) };
      } catch {
        students = [];
        settings = { ...DEFAULT_SETTINGS };
      }
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function syncSettings() {
      document.title = `${settings.title} - Showcase`;
      document.getElementById('showcaseTitle').textContent = settings.title;
      document.getElementById('showcaseSubtitle').textContent = settings.subtitle;
      document.getElementById('brandTitle').textContent = settings.title;
    }

    function updateCounts() {
      const count = students.length;
      document.getElementById('projectCount').textContent = count;
      document.getElementById('countBadge').textContent = `${count} project${count === 1 ? '' : 's'}`;
    }

    function visibleStudents() {
      const query = searchInput.value.trim().toLowerCase();
      if (!query) return students.map((student, index) => ({ student, index }));
      return students.map((student, index) => ({ student, index })).filter(({ student }) => {
        const haystack = `${student.name || ''} ${student.description || ''} ${student.html || ''} ${student.css || ''} ${student.js || ''}`.toLowerCase();
        return haystack.includes(query);
      });
    }

    function buildSrcDoc(student) {
      const html = student.html || '<h1>Hello</h1><p>Add HTML in the admin page.</p>';
      const css = student.css || 'body { font-family: system-ui, sans-serif; padding: 2rem; }';
      const js = student.js || '';
      return `<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>${css}</style>
</head>
<body>
${html}
<script>
${js}
<\/script>
</body>
</html>`;
    }

    function renderProjects() {
      projectGrid.innerHTML = '';
      const items = visibleStudents();
      updateCounts();

      if (!students.length) {
        emptyState.classList.remove('d-none');
        return;
      }

      if (!items.length) {
        emptyState.classList.remove('d-none');
        emptyState.textContent = 'No matches found. Clear the search to see all projects.';
        return;
      }

      emptyState.classList.add('d-none');

      items.forEach(({ student, index }) => {
        const color = student.color || COLORS[index % COLORS.length];
        const column = document.createElement('div');
        column.className = 'col';
        column.innerHTML = `
          <div class="card h-100">
            <div class="project-cover" style="background: linear-gradient(135deg, ${color}, color-mix(in srgb, ${color} 60%, #000 40%));">
              <div class="project-letter">${escapeHtml((student.name || '?').charAt(0).toUpperCase())}</div>
              <div class="project-tag">Local code</div>
            </div>
            <div class="card-body d-grid gap-2">
              <h3 class="h5 mb-0">${escapeHtml(student.name || 'Untitled project')}</h3>
              <p class="text-secondary mb-0">${escapeHtml(student.description || 'No description added yet.')}</p>
              <div class="d-flex flex-wrap gap-2 mt-1">
                <span class="badge text-bg-light border">HTML / CSS / JS</span>
                <span class="badge text-bg-light border">Project ${index + 1}</span>
              </div>
            </div>
            <div class="card-footer bg-transparent border-0 pt-0 pb-3 px-3 d-flex gap-2">
              <button class="btn btn-primary flex-fill" type="button" data-action="open" data-index="${index}">Open</button>
              <button class="btn btn-outline-secondary" type="button" data-action="qr" data-index="${index}">QR</button>
            </div>
          </div>
        `;
        projectGrid.appendChild(column);
      });
    }

    function openViewer(index) {
      const student = students[index];
      if (!student) return;
      document.getElementById('viewerTitle').textContent = student.name;
      document.getElementById('viewerFrame').srcdoc = buildSrcDoc(student);
      viewerModal.show();
    }

    function openQr(index) {
      const student = students[index];
      if (!student) return;
      qrIndex = index;
      document.getElementById('qrTitle').textContent = student.name;
      document.getElementById('qrHint').textContent = 'Local project preview';
      const container = document.getElementById('qrContainer');
      container.innerHTML = '';
      new QRCode(container, {
        text: `${student.name} project`,
        width: 220,
        height: 220,
        colorDark: '#111111',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
      qrModal.show();
    }

    function downloadQr() {
      const canvas = document.querySelector('#qrContainer canvas');
      if (!canvas || qrIndex === null) {
        alert('QR code is not ready yet.');
        return;
      }
      const student = students[qrIndex];
      const link = document.createElement('a');
      link.href = canvas.toDataURL('image/png');
      link.download = `${student.name.toLowerCase().replace(/[^a-z0-9]+/g, '-') || 'student'}-qr.png`;
      link.click();
    }

    projectGrid.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-action]');
      if (!button) return;
      const index = Number(button.dataset.index);
      if (button.dataset.action === 'open') openViewer(index);
      if (button.dataset.action === 'qr') openQr(index);
    });

    document.getElementById('downloadQrBtn').addEventListener('click', downloadQr);
    document.getElementById('qrModal').addEventListener('hidden.bs.modal', () => {
      document.getElementById('qrContainer').innerHTML = '';
      qrIndex = null;
    });

    loadData();
    syncSettings();
    renderProjects();
  </script>
</body>
</html>
