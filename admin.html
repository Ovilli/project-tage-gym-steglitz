<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(180deg, #f8f6f1 0%, #eef2f6 100%); }
    .panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
    .code-box { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre-wrap; }
    .minw-0 { min-width: 0; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top">
    <div class="container py-2">
      <span class="navbar-brand fw-bold mb-0">Admin</span>
      <div class="d-flex align-items-center gap-2">
        <a class="btn btn-outline-secondary btn-sm" href="index.html">Back to site</a>
        <button class="btn btn-outline-danger btn-sm d-none" id="logoutBtn" type="button">Logout</button>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row g-4">
      <div class="col-lg-4">
        <div class="panel border rounded-4 p-4 shadow-sm">
          <p class="text-uppercase text-primary fw-semibold small mb-2">Protected admin</p>
          <h1 class="h3 fw-bold mb-3">Manage the showcase</h1>
          <p class="text-secondary mb-0">The main site stays read-only. Use this page to set the password, add projects, and update local content.</p>
        </div>
      </div>

      <div class="col-lg-8">
        <div id="authCard" class="panel border rounded-4 p-4 shadow-sm mb-4"></div>
        <div id="dashboard" class="d-none">
          <div class="panel border rounded-4 p-4 shadow-sm mb-4">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end gap-3 mb-3">
              <div>
                <h2 class="h4 mb-1">Showcase settings</h2>
                <p class="text-secondary mb-0">These values appear on the main page.</p>
              </div>
              <div class="d-flex gap-2 flex-wrap">
                <button class="btn btn-outline-secondary btn-sm" type="button" id="exportBtn">Export JSON</button>
                <button class="btn btn-outline-secondary btn-sm" type="button" id="importBtn">Import JSON</button>
                <input type="file" class="d-none" id="importFile" accept="application/json,.json">
              </div>
            </div>
            <div class="row g-3">
              <div class="col-md-6">
                <label for="settingTitle" class="form-label">Title</label>
                <input type="text" class="form-control" id="settingTitle">
              </div>
              <div class="col-md-6">
                <label for="settingSubtitle" class="form-label">Subtitle</label>
                <input type="text" class="form-control" id="settingSubtitle">
              </div>
            </div>
          </div>

          <div class="panel border rounded-4 p-4 shadow-sm mb-4">
            <div class="d-flex justify-content-between align-items-end gap-3 mb-3">
              <div>
                <h2 class="h4 mb-1">Add / edit project</h2>
                <p class="text-secondary mb-0">All project code is stored locally.</p>
              </div>
              <button class="btn btn-outline-secondary btn-sm" type="button" id="cancelEditBtn">Cancel edit</button>
            </div>
            <form id="projectForm" class="row g-3">
              <div class="col-md-6">
                <label for="studentName" class="form-label">Student name</label>
                <input type="text" class="form-control" id="studentName" placeholder="e.g. Maria Gonzalez">
              </div>
              <div class="col-md-6">
                <label for="projectColor" class="form-label">Card color</label>
                <input type="color" class="form-control form-control-color" id="projectColor" value="#1f3a5f">
              </div>
              <div class="col-12">
                <label for="projectDesc" class="form-label">Description</label>
                <textarea class="form-control" id="projectDesc" rows="3" placeholder="A short description"></textarea>
              </div>
              <div class="col-12">
                <label for="projectHtml" class="form-label">HTML</label>
                <textarea class="form-control code-box" id="projectHtml" rows="6" placeholder="<h1>Hello</h1>"></textarea>
              </div>
              <div class="col-12">
                <label for="projectCss" class="form-label">CSS</label>
                <textarea class="form-control code-box" id="projectCss" rows="6" placeholder="body { font-family: sans-serif; }"></textarea>
              </div>
              <div class="col-12">
                <label for="projectJs" class="form-label">JavaScript</label>
                <textarea class="form-control code-box" id="projectJs" rows="6" placeholder="document.querySelector('h1').textContent = 'Ready';"></textarea>
              </div>
              <div class="col-12 d-flex gap-2">
                <button class="btn btn-primary" type="submit" id="saveProjectBtn">Add project</button>
              </div>
            </form>
          </div>

          <div class="panel border rounded-4 p-4 shadow-sm">
            <h2 class="h4 mb-3">Saved projects</h2>
            <div class="list-group" id="adminList"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const STORAGE_KEYS = { students: 'showcase_students', settings: 'showcase_settings', adminCredentials: 'showcase_admin_credentials', adminSession: 'showcase_admin_session' };
    const DEFAULT_SETTINGS = { title: 'Student Projects', subtitle: 'Web Development - Spring 2025' };
    const SALT_BYTES = 16;
    const DEFAULT_ITERATIONS = 210000;
    const SESSION_HOURS = 12;

    let students = [];
    let settings = { ...DEFAULT_SETTINGS };
    let editingIndex = null;
    let sessionTimer = null;

    const authCard = document.getElementById('authCard');
    const dashboard = document.getElementById('dashboard');
    const logoutBtn = document.getElementById('logoutBtn');
    const adminList = document.getElementById('adminList');
    const projectForm = document.getElementById('projectForm');
    const saveProjectBtn = document.getElementById('saveProjectBtn');
    const importFile = document.getElementById('importFile');

    function loadData() {
      try {
        const storedStudents = localStorage.getItem(STORAGE_KEYS.students);
        const storedSettings = localStorage.getItem(STORAGE_KEYS.settings);
        if (storedStudents) students = JSON.parse(storedStudents) || [];
        if (storedSettings) settings = { ...settings, ...JSON.parse(storedSettings) };
      } catch {
        students = [];
        settings = { ...DEFAULT_SETTINGS };
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEYS.students, JSON.stringify(students));
      localStorage.setItem(STORAGE_KEYS.settings, JSON.stringify(settings));
    }

    function randomBytes(size) {
      const bytes = new Uint8Array(size);
      crypto.getRandomValues(bytes);
      return bytes;
    }

    function bytesToBase64(bytes) {
      let binary = '';
      bytes.forEach((byte) => { binary += String.fromCharCode(byte); });
      return btoa(binary);
    }

    function base64ToBytes(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function derivePasswordHash(password, saltBase64, iterations) {
      const encoder = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey('raw', encoder.encode(password), 'PBKDF2', false, ['deriveBits']);
      const bits = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt: base64ToBytes(saltBase64), iterations, hash: 'SHA-256' }, keyMaterial, 256);
      return bytesToBase64(new Uint8Array(bits));
    }

    function getStoredCredentials() {
      try {
        const raw = localStorage.getItem(STORAGE_KEYS.adminCredentials);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function getSession() {
      try {
        const raw = sessionStorage.getItem(STORAGE_KEYS.adminSession);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function setSession() {
      const expiresAt = Date.now() + SESSION_HOURS * 60 * 60 * 1000;
      sessionStorage.setItem(STORAGE_KEYS.adminSession, JSON.stringify({ expiresAt }));
    }

    function clearSession() {
      sessionStorage.removeItem(STORAGE_KEYS.adminSession);
      if (sessionTimer) window.clearInterval(sessionTimer);
      sessionTimer = null;
    }

    function sessionValid() {
      const session = getSession();
      return !!session && typeof session.expiresAt === 'number' && session.expiresAt > Date.now();
    }

    function renderAuthCard() {
      const hasCredentials = !!getStoredCredentials();
      if (!hasCredentials) {
        authCard.innerHTML = `
          <h2 class="h4 mb-2">Set admin password</h2>
          <p class="text-secondary">Create a password once, then use it to unlock the admin dashboard.</p>
          <div class="row g-3 mt-1">
            <div class="col-12">
              <label class="form-label" for="setupPassword">Password</label>
              <input type="password" class="form-control" id="setupPassword" autocomplete="new-password">
            </div>
            <div class="col-12">
              <label class="form-label" for="setupPasswordConfirm">Confirm password</label>
              <input type="password" class="form-control" id="setupPasswordConfirm" autocomplete="new-password">
            </div>
            <div class="col-12 d-flex gap-2">
              <button class="btn btn-primary" id="setupBtn" type="button">Create password</button>
            </div>
          </div>
        `;
        document.getElementById('setupBtn').addEventListener('click', setupPassword);
        return;
      }
      authCard.innerHTML = `
        <h2 class="h4 mb-2">Admin login</h2>
        <p class="text-secondary">Enter the password to unlock the dashboard.</p>
        <div class="row g-3 mt-1">
          <div class="col-12">
            <label class="form-label" for="loginPassword">Password</label>
            <input type="password" class="form-control" id="loginPassword" autocomplete="current-password">
          </div>
          <div class="col-12 d-flex gap-2">
            <button class="btn btn-primary" id="loginBtn" type="button">Login</button>
          </div>
        </div>
      `;
      document.getElementById('loginBtn').addEventListener('click', login);
    }

    async function setupPassword() {
      const password = document.getElementById('setupPassword').value;
      const confirmPassword = document.getElementById('setupPasswordConfirm').value;
      if (!password || password.length < 8) {
        alert('Use at least 8 characters.');
        return;
      }
      if (password !== confirmPassword) {
        alert('Passwords do not match.');
        return;
      }
      const salt = bytesToBase64(randomBytes(SALT_BYTES));
      const hash = await derivePasswordHash(password, salt, DEFAULT_ITERATIONS);
      localStorage.setItem(STORAGE_KEYS.adminCredentials, JSON.stringify({ salt, hash, iterations: DEFAULT_ITERATIONS }));
      setSession();
      showDashboard();
    }

    async function login() {
      const credentials = getStoredCredentials();
      if (!credentials) return;
      const password = document.getElementById('loginPassword').value;
      if (!password) {
        alert('Enter the password.');
        return;
      }
      const hash = await derivePasswordHash(password, credentials.salt, credentials.iterations || DEFAULT_ITERATIONS);
      if (hash !== credentials.hash) {
        alert('Invalid password.');
        return;
      }
      setSession();
      showDashboard();
    }

    function showDashboard() {
      authCard.classList.add('d-none');
      dashboard.classList.remove('d-none');
      logoutBtn.classList.remove('d-none');
      loadData();
      syncSettingsToUi();
      renderAdminList();
      resetProjectForm();
      if (sessionTimer) window.clearInterval(sessionTimer);
      sessionTimer = window.setInterval(() => {
        if (!sessionValid()) logout();
      }, 60000);
    }

    function logout() {
      clearSession();
      dashboard.classList.add('d-none');
      logoutBtn.classList.add('d-none');
      authCard.classList.remove('d-none');
      renderAuthCard();
    }

    function syncSettingsToUi() {
      document.getElementById('settingTitle').value = settings.title;
      document.getElementById('settingSubtitle').value = settings.subtitle;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function resetProjectForm() {
      editingIndex = null;
      projectForm.reset();
      document.getElementById('projectColor').value = '#1f3a5f';
      document.getElementById('projectHtml').value = '';
      document.getElementById('projectCss').value = '';
      document.getElementById('projectJs').value = '';
      saveProjectBtn.textContent = 'Add project';
    }

    function renderAdminList() {
      adminList.innerHTML = '';
      if (!students.length) {
        adminList.innerHTML = '<div class="text-secondary small">No students added yet.</div>';
        return;
      }
      students.forEach((student, index) => {
        const item = document.createElement('div');
        item.className = 'list-group-item';
        item.innerHTML = `
          <div class="d-flex align-items-start justify-content-between gap-3">
            <div class="flex-grow-1 minw-0">
              <div class="fw-semibold text-truncate">${escapeHtml(student.name)}</div>
              <div class="small text-secondary text-truncate">${escapeHtml(student.description || 'Local HTML/CSS/JS code')}</div>
            </div>
            <div class="d-flex flex-wrap gap-1 justify-content-end">
              <button class="btn btn-sm btn-outline-primary" type="button" data-action="edit" data-index="${index}">Edit</button>
              <button class="btn btn-sm btn-outline-secondary" type="button" data-action="up" data-index="${index}">↑</button>
              <button class="btn btn-sm btn-outline-secondary" type="button" data-action="down" data-index="${index}">↓</button>
              <button class="btn btn-sm btn-outline-danger" type="button" data-action="delete" data-index="${index}">Del</button>
            </div>
          </div>
        `;
        adminList.appendChild(item);
      });
    }

    function fillProjectForm(index) {
      const student = students[index];
      editingIndex = index;
      document.getElementById('studentName').value = student.name || '';
      document.getElementById('projectDesc').value = student.description || '';
      document.getElementById('projectHtml').value = student.html || '';
      document.getElementById('projectCss').value = student.css || '';
      document.getElementById('projectJs').value = student.js || '';
      document.getElementById('projectColor').value = student.color || '#1f3a5f';
      saveProjectBtn.textContent = 'Update project';
    }

    function saveProjectFromForm(event) {
      event.preventDefault();
      const name = document.getElementById('studentName').value.trim();
      const description = document.getElementById('projectDesc').value.trim();
      const html = document.getElementById('projectHtml').value.trim();
      const css = document.getElementById('projectCss').value.trim();
      const js = document.getElementById('projectJs').value.trim();
      const color = document.getElementById('projectColor').value;
      if (!name) {
        alert('Please enter a student name.');
        return;
      }
      if (!html && !css && !js) {
        alert('Please add HTML, CSS, or JavaScript.');
        return;
      }
      const nextStudent = { name, description, html, css, js, color };
      if (editingIndex === null) students.push(nextStudent);
      else students[editingIndex] = nextStudent;
      saveData();
      renderAdminList();
      resetProjectForm();
    }

    function updateSettingsFromForm() {
      settings.title = document.getElementById('settingTitle').value.trim() || DEFAULT_SETTINGS.title;
      settings.subtitle = document.getElementById('settingSubtitle').value.trim() || '';
      saveData();
    }

    function moveStudent(index, direction) {
      const nextIndex = index + direction;
      if (nextIndex < 0 || nextIndex >= students.length) return;
      [students[index], students[nextIndex]] = [students[nextIndex], students[index]];
      if (editingIndex === index) editingIndex = nextIndex;
      else if (editingIndex === nextIndex) editingIndex = index;
      saveData();
      renderAdminList();
    }

    function deleteStudent(index) {
      if (!confirm(`Delete ${students[index].name}?`)) return;
      students.splice(index, 1);
      if (editingIndex === index) resetProjectForm();
      saveData();
      renderAdminList();
    }

    function exportData() {
      const blob = new Blob([JSON.stringify({ settings, students }, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'showcase-data.json';
      link.click();
      URL.revokeObjectURL(url);
    }

    function importDataFromFile(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          students = Array.isArray(data.students) ? data.students : [];
          settings = { ...DEFAULT_SETTINGS, ...(data.settings || {}) };
          saveData();
          syncSettingsToUi();
          renderAdminList();
          resetProjectForm();
        } catch {
          alert('Invalid JSON file.');
        }
      };
      reader.readAsText(file);
    }

    adminList.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-action]');
      if (!button) return;
      const index = Number(button.dataset.index);
      const action = button.dataset.action;
      if (action === 'edit') fillProjectForm(index);
      if (action === 'up') moveStudent(index, -1);
      if (action === 'down') moveStudent(index, 1);
      if (action === 'delete') deleteStudent(index);
    });

    document.getElementById('exportBtn').addEventListener('click', exportData);
    document.getElementById('importBtn').addEventListener('click', () => importFile.click());
    importFile.addEventListener('change', (event) => {
      const file = event.target.files && event.target.files[0];
      if (file) importDataFromFile(file);
      event.target.value = '';
    });
    document.getElementById('cancelEditBtn').addEventListener('click', resetProjectForm);
    document.getElementById('settingTitle').addEventListener('input', updateSettingsFromForm);
    document.getElementById('settingSubtitle').addEventListener('input', updateSettingsFromForm);
    projectForm.addEventListener('submit', saveProjectFromForm);
    logoutBtn.addEventListener('click', logout);

    loadData();
    syncSettingsToUi();
    renderAuthCard();
    if (sessionValid()) showDashboard();
  </script>
</body>
</html>
