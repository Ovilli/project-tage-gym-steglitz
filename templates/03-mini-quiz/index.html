<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini-Quiz</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="quiz">
    <h1>🧠 Mini-Quiz</h1>

    <!-- Hier zeigt JavaScript Frage, Antworten und Punkte an. -->
    <p id="frage" class="frage">Frage erscheint hier …</p>
    <div id="antworten" class="antworten"></div>

    <p id="punkte" class="punkte">Punkte: 0</p>

    <button id="weiter" class="weiter">Nächste Frage</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
