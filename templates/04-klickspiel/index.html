<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klickspiel</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header class="leiste">
    <h1>🎯 Fang das Ziel!</h1>
    <div class="anzeige">
      <span>⏱️ Zeit: <strong id="zeit">15</strong></span>
      <span>⭐ Punkte: <strong id="punkte">0</strong></span>
    </div>
    <button id="start">Start</button>
  </header>

  <!-- Das Spielfeld. JavaScript setzt das Ziel an zufällige Stellen. -->
  <main id="feld" class="feld">
    <p id="hinweis" class="hinweis">Klick auf »Start« und dann so schnell wie möglich auf das 🎯</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
